<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Personal Record — Crown</title>
  <!-- crown body (5 peaks) -->
  <path d="M8 44
           L 12 20
           L 22 32
           L 32 14
           L 42 32
           L 52 20
           L 56 44 Z"
        fill="#F5C842"/>
  <!-- crown highlight along the inside -->
  <path d="M12 42
           L 14 26
           L 22 35
           L 32 20
           L 42 35
           L 50 26
           L 52 42 Z"
        fill="#FFE07A" opacity="0.6"/>
  <!-- base band -->
  <rect x="8" y="44" width="48" height="8" rx="1" fill="#C8881C"/>
  <!-- base highlight -->
  <rect x="10" y="46" width="44" height="2" fill="#FFE07A" opacity="0.5"/>
  <!-- gems on peaks -->
  <circle cx="12" cy="20" r="2.5" fill="#E63946"/>
  <circle cx="32" cy="14" r="3" fill="#3D7AE6"/>
  <circle cx="52" cy="20" r="2.5" fill="#2EC27E"/>
  <!-- center band gem -->
  <rect x="29" y="46" width="6" height="4" rx="1" fill="#3D7AE6"/>
</svg>
